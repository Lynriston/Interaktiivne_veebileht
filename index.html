<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Minu interaktiivne veebileht</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Minu interaktiivne veebileht</h1>

    <!-- Navigatsioon -->
    <div class="d-flex justify-content-between align-items-center">

    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link active" href="#" onclick="showSection(event, 'home')">Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#" onclick="showSection(event, 'todo')">To-Do</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#" onclick="showSection(event, 'calc')">Kalkulaator</a>
        </li>
    </ul>

    <!-- Dark mode nupp -->
    <button class="btn btn-dark" onclick="toggleTheme()">🌙</button>

    </div>

    <!-- HOME -->
    <div id="home" class="section mt-4">
        <div class="alert alert-primary text-center">
            Tere tulemast! Vali ülal funktsioon 👆
        </div>
    </div>

    <!-- TODO -->
    <div id="todo" class="section mt-4 d-none">
        <div class="card p-3">

            <h3>To-Do List</h3>

            <div class="input-group mb-3">
                <input type="text" id="taskInput" class="form-control" placeholder="Lisa ülesanne">
                <button class="btn btn-success" onclick="addTask()">Lisa</button>
            </div>

            <div class="mb-2">
                <button class="btn btn-outline-primary btn-sm" onclick="filterTasks('all')">Kõik</button>
                <button class="btn btn-outline-primary btn-sm" onclick="filterTasks('active')">Tegemata</button>
                <button class="btn btn-outline-primary btn-sm" onclick="filterTasks('done')">Tehtud</button>
            </div>

            <ul id="taskList" class="list-group"></ul>

        </div>
    </div>

    <!-- CALCULATOR -->
    <div id="calc" class="section mt-4 d-none">
        <div class="card p-3">

            <h3>Kalkulaator</h3>

            <div class="row mb-3">
                <div class="col">
                    <input type="number" id="num1" class="form-control" placeholder="Esimene arv">
                </div>
                <div class="col">
                    <input type="number" id="num2" class="form-control" placeholder="Teine arv">
                </div>
            </div>

            <div class="mb-3">
                <button class="btn btn-primary" onclick="calculate('+')">+</button>
                <button class="btn btn-primary" onclick="calculate('-')">-</button>
                <button class="btn btn-primary" onclick="calculate('*')">*</button>
                <button class="btn btn-primary" onclick="calculate('/')">/</button>
            </div>

            <h4>Tulemus: <span id="result">0</span></h4>

        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
